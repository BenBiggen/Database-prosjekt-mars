<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambling Masking 6700 2.0</title>
    <script src='elements.cardmeister.full.js' defer></script>
    <script src='script.js' defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div id="houseDiv"></div>
        <div id="handDiv"></div>
        <div id="buttons">
            <button type="button" id="hit">HIT</button>
            <button type="button" id="stand">STAND</button>
            <button type="button" id="play">SPILL</button>
        </div>
        <div id="alert"></div>
        <div id="betting">
            <h1>BETTING: </h1>
            <button type="button" id="10">$10</button>
            <button type="button" id="25">$25</button>
            <button type="button" id="50">$50</button>
            <button type="button" id="100">$100</button>
        </div>
        <div id="wager"></div>
        <div id="account"></div>
        <div id="userCheck">
            <select name="users" id="users">
                <option value="1">user1</option>
                <option value="2">user2</option>
                <option value="3">user3</option>
                <option value="4">user4</option>
            </select>
            <button type="button" id="userConfirm">confirm user</button>
            <div id="currentUser"></div>
            <button type="button" id="userInfo" onclick="window.location.href='userInfo.html'">user INFO</button>
        </div>
    <houseSum id="houseSum"></houseSum>
    <handSum id="handSum"></handSum>
</body>
</html>
